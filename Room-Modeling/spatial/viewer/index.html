<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpatialLM Room Review Editor</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --text: #18181b;
      --muted: #6b7280;
      --border: #d6d6db;
      --wall: #444;
      --door: #2f855a;
      --window: #2563eb;
      --furniture: #8b5cf6;
      --unknown: #b45309;
      --selected: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 { font-size: 18px; margin: 0 10px 0 0; }
    button, input, select, textarea {
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 9px;
      background: white;
    }
    button { cursor: pointer; }
    button.primary { background: #18181b; color: white; border-color: #18181b; }
    button.danger { color: #b91c1c; border-color: #fecaca; background: #fff7f7; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    main {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 360px;
      gap: 14px;
      padding: 14px;
      height: calc(100vh - 68px);
    }
    .canvasPanel, .sidePanel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-height: 0;
    }
    .canvasPanel {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .toolbar, .statusbar {
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .statusbar { border-top: 1px solid var(--border); border-bottom: 0; color: var(--muted); font-size: 13px; }
    #floorplanWrap { min-height: 0; overflow: auto; background: #fbfbfc; }
    svg { width: 100%; height: 100%; min-height: 520px; display: block; }
    .gridLine { stroke: #e5e7eb; stroke-width: 0.015; vector-effect: non-scaling-stroke; }
    .entity rect, .entity line { cursor: move; vector-effect: non-scaling-stroke; }
    .entity text { pointer-events: none; font-size: 0.18px; fill: #111827; paint-order: stroke; stroke: white; stroke-width: 0.045px; }
    .entity.wall rect { fill: rgba(68,68,68,0.55); stroke: var(--wall); }
    .entity.door rect { fill: rgba(47,133,90,0.35); stroke: var(--door); }
    .entity.window rect { fill: rgba(37,99,235,0.28); stroke: var(--window); }
    .entity.furniture rect { fill: rgba(139,92,246,0.32); stroke: var(--furniture); }
    .entity.unknown rect { fill: rgba(180,83,9,0.30); stroke: var(--unknown); }
    .entity.selected rect { stroke: var(--selected); stroke-width: 0.045; }
    .entity.confirmed rect { stroke-dasharray: 0.08 0.04; }
    .sidePanel { display: grid; grid-template-rows: auto 1fr; }
    .sidePanel h2 { font-size: 16px; margin: 0; padding: 12px; border-bottom: 1px solid var(--border); }
    .editor { padding: 12px; overflow: auto; }
    .empty { color: var(--muted); padding: 12px; }
    .field { display: grid; gap: 5px; margin-bottom: 10px; }
    .field label { color: var(--muted); font-size: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .list { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .listItem {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px;
      margin-bottom: 5px;
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
    }
    .listItem.active { border-color: var(--selected); }
    .badge { font-size: 11px; color: var(--muted); }
    .legend { margin-left: auto; display: flex; gap: 10px; font-size: 12px; color: var(--muted); }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: -1px; }
    .hint { color: var(--muted); font-size: 12px; }
    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; height: auto; }
      .sidePanel { min-height: 520px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>SpatialLM Room Review Editor</h1>
    <button id="loadDefaultBtn">Load ./scene.json</button>
    <input id="fileInput" type="file" accept=".json,application/json" />
    <button id="exportJsonBtn" class="primary">Export JSON</button>
    <button id="exportCsvBtn">Export CSV</button>
    <button id="addBtn">Add object</button>
    <span class="legend">
      <span><i class="dot" style="background:#444"></i>wall</span>
      <span><i class="dot" style="background:#2f855a"></i>door</span>
      <span><i class="dot" style="background:#2563eb"></i>window</span>
      <span><i class="dot" style="background:#8b5cf6"></i>furniture</span>
    </span>
  </header>

  <main>
    <section class="canvasPanel">
      <div class="toolbar">
        <button id="fitBtn">Fit view</button>
        <button id="snapBtn">Snap selected to 0/90/180/270°</button>
        <span class="hint">Drag rectangles to adjust x/y. Use the right panel for size, height, label, and rotation.</span>
      </div>
      <div id="floorplanWrap">
        <svg id="floorplan" xmlns="http://www.w3.org/2000/svg" aria-label="Top-down room layout"></svg>
      </div>
      <div class="statusbar" id="statusbar">No scene loaded yet.</div>
    </section>

    <aside class="sidePanel">
      <h2>Selected object</h2>
      <div class="editor" id="editor"></div>
    </aside>
  </main>

<script>
const state = {
  scene: null,
  selectedId: null,
  dragging: null,
  viewBox: { minX: -1, minY: -1, width: 2, height: 2 }
};

const svg = document.getElementById('floorplan');
const editor = document.getElementById('editor');
const statusbar = document.getElementById('statusbar');

const kindRank = { wall: 0, door: 1, window: 2, furniture: 3, object: 4, unknown: 5 };

function deg(rad) { return rad * 180 / Math.PI; }
function rad(deg) { return deg * Math.PI / 180; }
function fmt(v) { return Number.isFinite(+v) ? (+v).toFixed(2) : ''; }
function selected() { return state.scene?.entities?.find(e => e.id === state.selectedId) || null; }

function defaultScene() {
  return {
    schema_version: 'room_scene_v1',
    units: 'meters',
    coordinate_system: { up_axis: 'z', topdown_axes: ['x', 'y'], yaw_axis: 'z', yaw_units: 'radians' },
    source: {},
    bounds: { min_x: -2, max_x: 2, min_y: -2, max_y: 2 },
    entities: [],
    skipped_lines: []
  };
}

function computeBounds() {
  const ents = state.scene?.entities || [];
  if (!ents.length) return { min_x: -2, max_x: 2, min_y: -2, max_y: 2 };
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const e of ents) {
    const c = Math.abs(Math.cos(e.yaw_rad || 0));
    const s = Math.abs(Math.sin(e.yaw_rad || 0));
    const halfX = 0.5 * ((+e.width || 0.1) * c + (+e.depth || 0.1) * s);
    const halfY = 0.5 * ((+e.width || 0.1) * s + (+e.depth || 0.1) * c);
    minX = Math.min(minX, (+e.x || 0) - halfX);
    maxX = Math.max(maxX, (+e.x || 0) + halfX);
    minY = Math.min(minY, (+e.y || 0) - halfY);
    maxY = Math.max(maxY, (+e.y || 0) + halfY);
  }
  const pad = 0.6;
  return { min_x: minX - pad, max_x: maxX + pad, min_y: minY - pad, max_y: maxY + pad };
}

function fitView() {
  if (!state.scene) return;
  state.scene.bounds = computeBounds();
  const b = state.scene.bounds;
  const width = Math.max(1, b.max_x - b.min_x);
  const height = Math.max(1, b.max_y - b.min_y);
  state.viewBox = { minX: b.min_x, minY: -b.max_y, width, height };
  svg.setAttribute('viewBox', `${state.viewBox.minX} ${state.viewBox.minY} ${state.viewBox.width} ${state.viewBox.height}`);
}

function worldToSvgY(y) { return -y; }
function svgYToWorld(y) { return -y; }

function clientToWorld(evt) {
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  const p = pt.matrixTransform(svg.getScreenCTM().inverse());
  return { x: p.x, y: svgYToWorld(p.y) };
}

function renderGrid(b) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('aria-hidden', 'true');
  const startX = Math.floor(b.min_x);
  const endX = Math.ceil(b.max_x);
  const startY = Math.floor(b.min_y);
  const endY = Math.ceil(b.max_y);
  for (let x = startX; x <= endX; x++) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('class', 'gridLine');
    line.setAttribute('x1', x); line.setAttribute('x2', x);
    line.setAttribute('y1', worldToSvgY(startY)); line.setAttribute('y2', worldToSvgY(endY));
    g.appendChild(line);
  }
  for (let y = startY; y <= endY; y++) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('class', 'gridLine');
    line.setAttribute('x1', startX); line.setAttribute('x2', endX);
    line.setAttribute('y1', worldToSvgY(y)); line.setAttribute('y2', worldToSvgY(y));
    g.appendChild(line);
  }
  return g;
}

function render() {
  svg.innerHTML = '';
  if (!state.scene) {
    editor.innerHTML = '<div class="empty">Load a generated scene.json to start.</div>';
    statusbar.textContent = 'No scene loaded yet.';
    return;
  }
  fitView();
  svg.appendChild(renderGrid(state.scene.bounds));

  const ents = [...state.scene.entities].sort((a, b) => (kindRank[a.kind] ?? 9) - (kindRank[b.kind] ?? 9));
  for (const e of ents) {
    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const kind = e.kind || 'unknown';
    group.setAttribute('class', `entity ${kind} ${e.confirmed ? 'confirmed' : ''} ${e.id === state.selectedId ? 'selected' : ''}`);
    group.setAttribute('data-id', e.id);
    const x = +e.x || 0, y = +e.y || 0;
    const w = Math.max(+e.width || 0.1, 0.02);
    const d = Math.max(+e.depth || 0.1, 0.02);
    group.setAttribute('transform', `translate(${x} ${worldToSvgY(y)}) rotate(${-deg(e.yaw_rad || 0)})`);

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', -w / 2); rect.setAttribute('y', -d / 2);
    rect.setAttribute('width', w); rect.setAttribute('height', d);
    rect.setAttribute('rx', Math.min(w, d) * 0.05);
    group.appendChild(rect);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'central');
    text.textContent = e.label || e.kind || e.id;
    group.appendChild(text);

    group.addEventListener('pointerdown', (evt) => startDrag(evt, e.id));
    group.addEventListener('click', (evt) => { evt.stopPropagation(); selectEntity(e.id); });
    svg.appendChild(group);
  }
  renderEditor();
  const n = state.scene.entities.length;
  const confirmed = state.scene.entities.filter(e => e.confirmed).length;
  statusbar.textContent = `${n} entities loaded · ${confirmed} confirmed · units: ${state.scene.units || 'meters'}`;
}

function renderEditor() {
  const e = selected();
  if (!e) {
    editor.innerHTML = `<div class="empty">No object selected.</div>${renderEntityListHtml()}`;
    bindListClicks();
    return;
  }
  editor.innerHTML = `
    <div class="field"><label>ID</label><input value="${escapeHtml(e.id)}" disabled></div>
    <div class="row">
      <div class="field"><label>Kind</label>${selectHtml('kind', e.kind || 'unknown', ['wall','door','window','furniture','object','unknown'])}</div>
      <div class="field"><label>Label</label><input data-field="label" value="${escapeHtml(e.label || '')}"></div>
    </div>
    <div class="row">
      <div class="field"><label>X</label><input data-field="x" type="number" step="0.01" value="${fmt(e.x)}"></div>
      <div class="field"><label>Y</label><input data-field="y" type="number" step="0.01" value="${fmt(e.y)}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Z / center height</label><input data-field="z" type="number" step="0.01" value="${fmt(e.z)}"></div>
      <div class="field"><label>Yaw degrees</label><input id="yawDeg" type="number" step="1" value="${fmt(deg(e.yaw_rad || 0))}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Width / length</label><input data-field="width" type="number" step="0.01" value="${fmt(e.width)}"></div>
      <div class="field"><label>Depth / thickness</label><input data-field="depth" type="number" step="0.01" value="${fmt(e.depth)}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Height</label><input data-field="height" type="number" step="0.01" value="${fmt(e.height)}"></div>
      <div class="field"><label>Confirmed</label><select data-field="confirmed"><option value="false" ${!e.confirmed ? 'selected' : ''}>No</option><option value="true" ${e.confirmed ? 'selected' : ''}>Yes</option></select></div>
    </div>
    <div class="field"><label>Notes</label><textarea data-field="notes" rows="3">${escapeHtml(e.notes || '')}</textarea></div>
    <div class="row">
      <button id="confirmBtn" class="primary">Mark confirmed</button>
      <button id="deleteBtn" class="danger">Delete</button>
    </div>
    <div class="hint" style="margin-top:10px;">Raw SpatialLM source line, if available:<br>${escapeHtml(e.raw?.line || 'N/A')}</div>
    ${renderEntityListHtml()}
  `;
  editor.querySelectorAll('[data-field]').forEach(input => {
    input.addEventListener('input', () => updateField(input.dataset.field, input.value));
    input.addEventListener('change', () => updateField(input.dataset.field, input.value));
  });
  document.getElementById('yawDeg')?.addEventListener('input', evt => {
    e.yaw_rad = rad(+evt.target.value || 0);
    drawOnly();
  });
  document.getElementById('confirmBtn')?.addEventListener('click', () => { e.confirmed = true; render(); });
  document.getElementById('deleteBtn')?.addEventListener('click', deleteSelected);
  bindListClicks();
}

function drawOnly() {
  // Re-render everything, but preserve current selected state.
  render();
}

function selectHtml(field, value, opts) {
  return `<select data-field="${field}">` + opts.map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`).join('') + '</select>';
}

function updateField(field, value) {
  const e = selected();
  if (!e) return;
  if (['x','y','z','width','depth','height'].includes(field)) e[field] = +value || 0;
  else if (field === 'confirmed') e.confirmed = value === 'true';
  else e[field] = value;
  drawOnly();
}

function renderEntityListHtml() {
  if (!state.scene?.entities?.length) return '';
  const items = [...state.scene.entities]
    .sort((a, b) => (kindRank[a.kind] ?? 9) - (kindRank[b.kind] ?? 9) || String(a.id).localeCompare(String(b.id)))
    .map(e => `<div class="listItem ${e.id === state.selectedId ? 'active' : ''}" data-select-id="${escapeHtml(e.id)}"><span>${escapeHtml(e.label || e.id)}</span><span class="badge">${escapeHtml(e.kind || '')}${e.confirmed ? ' ✓' : ''}</span></div>`)
    .join('');
  return `<div class="list"><div class="hint" style="margin-bottom:8px;">Objects</div>${items}</div>`;
}

function bindListClicks() {
  editor.querySelectorAll('[data-select-id]').forEach(el => el.addEventListener('click', () => selectEntity(el.dataset.selectId)));
}

function selectEntity(id) {
  state.selectedId = id;
  render();
}

function startDrag(evt, id) {
  evt.preventDefault();
  evt.stopPropagation();
  selectEntity(id);
  const e = selected();
  const p = clientToWorld(evt);
  state.dragging = { id, dx: e.x - p.x, dy: e.y - p.y };
  svg.setPointerCapture(evt.pointerId);
}

svg.addEventListener('pointermove', evt => {
  if (!state.dragging) return;
  const e = selected();
  if (!e || e.id !== state.dragging.id) return;
  const p = clientToWorld(evt);
  e.x = p.x + state.dragging.dx;
  e.y = p.y + state.dragging.dy;
  render();
});

svg.addEventListener('pointerup', evt => {
  state.dragging = null;
  try { svg.releasePointerCapture(evt.pointerId); } catch (_) {}
});

svg.addEventListener('click', () => { state.selectedId = null; render(); });

function addObject() {
  if (!state.scene) state.scene = defaultScene();
  const id = `manual_${Date.now()}`;
  state.scene.entities.push({
    id, kind: 'furniture', label: 'new_object', x: 0, y: 0, z: 0.4, yaw_rad: 0,
    yaw_deg: 0, width: 1, depth: 0.6, height: 0.8, confirmed: false, source: 'manual', raw: {}, notes: ''
  });
  state.selectedId = id;
  render();
}

function deleteSelected() {
  if (!state.scene || !state.selectedId) return;
  state.scene.entities = state.scene.entities.filter(e => e.id !== state.selectedId);
  state.selectedId = null;
  render();
}

function snapSelected() {
  const e = selected();
  if (!e) return;
  const degrees = deg(e.yaw_rad || 0);
  const snapped = Math.round(degrees / 90) * 90;
  e.yaw_rad = rad(snapped);
  render();
}

function exportJson() {
  if (!state.scene) return;
  state.scene.bounds = computeBounds();
  for (const e of state.scene.entities) e.yaw_deg = deg(e.yaw_rad || 0);
  download('room_scene_confirmed.json', JSON.stringify(state.scene, null, 2), 'application/json');
}

function exportCsv() {
  if (!state.scene) return;
  const fields = ['id','kind','label','x','y','z','yaw_rad','yaw_deg','width','depth','height','confirmed','notes'];
  const rows = [fields.join(',')];
  for (const e of state.scene.entities) {
    e.yaw_deg = deg(e.yaw_rad || 0);
    rows.push(fields.map(f => csvCell(e[f])).join(','));
  }
  download('room_entities_confirmed.csv', rows.join('\n'), 'text/csv');
}

function csvCell(v) {
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"' + s.replaceAll('"', '""') + '"' : s;
}

function download(filename, text, type) {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

async function loadDefault() {
  try {
    const url = new URL(window.location.href);
    const sceneParam = url.searchParams.get('scene') || '../scene.json';
    const res = await fetch(sceneParam, { cache: 'no-store' });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const scene = await res.json();
    setScene(scene);
  } catch (err) {
    alert('Could not load ./scene.json automatically. Use the file picker instead, or serve the folder with `python -m http.server`.\n\n' + err);
  }
}

function setScene(scene) {
  state.scene = scene || defaultScene();
  state.scene.entities ||= [];
  state.selectedId = state.scene.entities[0]?.id || null;
  render();
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

document.getElementById('loadDefaultBtn').addEventListener('click', loadDefault);
document.getElementById('exportJsonBtn').addEventListener('click', exportJson);
document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
document.getElementById('addBtn').addEventListener('click', addObject);
document.getElementById('deleteBtn')?.addEventListener('click', deleteSelected);
document.getElementById('fitBtn').addEventListener('click', () => { fitView(); });
document.getElementById('snapBtn').addEventListener('click', snapSelected);
document.getElementById('fileInput').addEventListener('change', async evt => {
  const file = evt.target.files?.[0];
  if (!file) return;
  setScene(JSON.parse(await file.text()));
});

render();
</script>
</body>
</html>
